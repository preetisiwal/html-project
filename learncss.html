<html>
    <head>
      <style>
         body
         {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            /*A background is REQUIRED for the blur to be visible*/
            background: linear-gradient (135deg ,#667eea 0%,#764ba2 50%,#f093fb 100%);
            font-family:sans-serif;
         }
         .card
         {
            padding: 40px 60px;
            color :aqua;
            font-size: 1.2rem;

            background-color: rgba(255,255,255,020); 
            backdrop-filter: blur(10px) saturate(180%);
            -webkit-backdrop-filter: blur(10px) saturation(180%);
            border: 1px solid rgba(255,255,255,030);
            border-radius: 16px;
            box-shadow: 0px 8px 32px rgba(0,0,0,025);
         }
      </style>
    <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
  </head>
     <body>
         <div class="w3-container w3-red">
            color by external css.
         </div>
         <div class="w3-text-black w3-green w3-hover-text-yellow w3-hover-blue w3-center">
            cplor by external css.
         </div>
         <div class="w3-yellow w3-text-black w3-right">
            coior by external css.
         </div>
         <div class="w3-card w3-grey w3-text-red">
            this is a card.
         </div>
         <div class="card">
            This is a internal card.
         </div>
     </body>
</html>
